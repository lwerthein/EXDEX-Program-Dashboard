html{ font-size:16px; }
body{

  color:#27272A; background:#FFFFFF; line-height:1.55;
  -webkit-font-smoothing:antialiased;
}

/* Header */
.top-bar{
  position:sticky; top:0; z-index:100; background:#FFF;
  border-bottom:1px solid #ECECEE; padding:14px 48px;
  display:flex; align-items:center; justify-content:space-between;
}
.top-bar-left{ display:flex; align-items:center; gap:16px; }
.top-bar-divider{ width:1px; height:22px; background:#ECECEE; }
.top-bar-title{ font-size:14px; color:#6A6A73; }
.sel{
  font-family:"GT America",sans-serif; font-size:13px; font-weight:700; color:#27272A;
  background:#F7F7F8; border:1px solid #ECECEE; border-radius:6px;
  padding:6px 30px 6px 10px; cursor:pointer;
  appearance:none; -webkit-appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23A1A1AA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat; background-position:right 10px center; min-width:200px;
}
.sel:hover{ border-color:#A1A1AA; }
.sel:focus{ outline:none; border-color:#27272A; }

.page{ max-width:1080px; margin:0 auto; padding:36px 32px 100px; }

/* Hero */
.hero{ text-align:center; padding:36px 0 28px; }
.hero-pill{
  display:inline-flex; align-items:center; gap:10px;
  font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
  padding:8px 20px; border-radius:100px;
}
.hero-pill.all-clear{ background:#ECFDF5; color:#059669; }
.hero-pill.has-risk{ background:#FFFBEB; color:#D97706; }
.hero-pill.has-block{ background:#FEF2F2; color:#DC2626; }
.hero-dot{ width:10px; height:10px; border-radius:50%; background:currentColor; }
.hero-sub{ font-size:13px; color:#A1A1AA; margin-top:8px; }
.hero-launch{
  display:inline-block; margin-top:10px;
  font-size:12px; font-weight:700; color:#6A6A73;
  background:#F3F4F6; padding:4px 14px; border-radius:5px;
}

/* Urgent */
.urgent{
  background:#FEF2F2; border:1px solid #FECACA; border-radius:10px;
  padding:16px 20px; margin-bottom:12px;
}
.urgent-header{
  display:flex; align-items:center; gap:8px;
  font-size:12px; font-weight:700; color:#991B1B;
  text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px;
}
.urgent-dot{ width:8px; height:8px; border-radius:50%; background:#DC2626; }
.urgent-list{ list-style:none; }
.urgent-list li{
  font-size:13px; color:#7F1D1D; line-height:1.5;
  padding:3px 0 3px 18px; position:relative;
}
.urgent-list li::before{
  content:""; position:absolute; left:0; top:10px;
  width:5px; height:5px; border-radius:50%; background:#FCA5A5;
}

/* Attention */
.attention{
  background:#FFFBEB; border:1px solid #FDE68A; border-radius:10px;
  padding:16px 20px; margin-bottom:28px;
}
.attention-header{
  display:flex; align-items:center; gap:8px;
  font-size:12px; font-weight:700; color:#92400E;
  text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px;
}
.attention-dot{ width:7px; height:7px; border-radius:50%; background:#D97706; }
.attention-list{ list-style:none; }
.attention-list li{
  font-size:13px; color:#78350F; line-height:1.5;
  padding:3px 0 3px 18px; position:relative;
}
.attention-list li::before{
  content:""; position:absolute; left:0; top:10px;
  width:5px; height:5px; border-radius:50%; background:#FBBF24;
}

/* Gantt chart */
.gantt-section{ margin-bottom:36px; }
.gantt-title{
  font-size:18px; font-weight:700; color:#27272A; margin-bottom:4px;
}
.gantt-subtitle{
  font-size:12px; color:#A1A1AA; margin-bottom:18px;
}
.gantt-wrapper{
  background:#FAFAFA; border:1px solid #ECECEE; border-radius:10px;
  padding:24px 24px 20px; overflow-x:auto;
}
.gantt{ position:relative; min-width:700px; }

.gantt-months{
  display:flex; padding-left:160px; margin-bottom:8px;
}
.gantt-month{
  flex:1; font-size:11px; font-weight:700; color:#A1A1AA;
  text-transform:uppercase; letter-spacing:.04em; text-align:center;
}

.gantt-body{ position:relative; padding-left:160px; }

.gantt-today{
  position:absolute; top:-6px; bottom:0; width:0;
  border-left:2px dashed #A1A1AA; z-index:2;
}
.gantt-today-label{
  position:absolute; top:-20px; left:-18px;
  font-size:9px; font-weight:700; color:#6A6A73;
  text-transform:uppercase; letter-spacing:.05em; white-space:nowrap;
}

.gantt-launch{
  position:absolute; top:-6px; bottom:0; width:0;
  border-left:2px solid #27272A; z-index:2;
}
.gantt-launch-label{
  position:absolute; top:-32px; right:-4px;
  font-size:9px; font-weight:700; color:#27272A;
  white-space:nowrap; text-align:right;
}

.gantt-lane{
  display:flex; align-items:center; height:52px;
  border-bottom:1px dashed #ECECEE; position:relative;
}
.gantt-lane:last-child{ border-bottom:none; }
.gantt-lane-label{
  position:absolute; left:-160px; width:148px;
  display:flex; align-items:center; gap:8px;
  font-size:12px; font-weight:700; color:#27272A;
}
.gantt-status-dot{
  width:10px; height:10px; border-radius:50%; flex-shrink:0;
}
.gantt-bar-track{
  flex:1; position:relative; height:10px;
}
.gantt-bar{
  position:absolute; height:10px; border-radius:5px; opacity:0.3;
}
.gantt-bar-active{
  position:absolute; height:10px; border-radius:5px;
}
.gantt-milestone{
  position:absolute; top:50%; transform:translate(-50%,-50%);
  width:12px; height:12px; background:#27272A; border-radius:50%;
  z-index:3;
}
.gantt-ms-label{
  position:absolute; top:28px; left:50%; transform:translateX(-50%);
  font-size:9px; color:#6A6A73; white-space:nowrap; text-align:center;
  max-width:100px; line-height:1.2;
}

/* Section label */
.sec-label{
  font-size:11px; font-weight:700; color:#A1A1AA;
  text-transform:uppercase; letter-spacing:.08em; margin-bottom:14px;
}

/* Workstream colors */
:root{
  --ws-ops:#10B981; --ws-ops-bg:#ECFDF5; --ws-ops-border:#A7F3D0;
  --ws-app:#3B82F6; --ws-app-bg:#EFF6FF; --ws-app-border:#BFDBFE;
  --ws-products:#8B5CF6; --ws-products-bg:#F5F3FF; --ws-products-border:#DDD6FE;
  --ws-experiences:#F59E0B; --ws-experiences-bg:#FFFBEB; --ws-experiences-border:#FDE68A;
}

/* What's coming up */
.next-up{ margin-bottom:36px; }
.next-list{ display:flex; flex-direction:column; }
.next-item{
  display:grid; grid-template-columns:68px 1fr auto;
  gap:14px; align-items:baseline;
  padding:10px 0; border-bottom:1px solid #F4F4F5;
}
.next-item:last-child{ border-bottom:none; }
.next-date{ font-size:13px; font-weight:700; color:#27272A; white-space:nowrap; }
.next-text{ font-size:13px; color:#6A6A73; }
.next-tag{
  font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px;
  white-space:nowrap; text-transform:uppercase; letter-spacing:.04em;
}

/* Workstream cards */
.ws-section{ margin-bottom:36px; }
.ws{
  border-radius:10px; margin-bottom:14px; overflow:hidden;
  border:1px solid #ECECEE;
}
.ws-color-bar{ height:4px; }
.ws-bar{
  display:grid; grid-template-columns:1fr auto auto;
  align-items:center; gap:14px; padding:16px 20px;
  cursor:pointer; user-select:none; transition:background .1s;
}
.ws-bar:hover{ background:#FAFAFA; }
.ws-bar-left{ display:flex; flex-direction:column; gap:1px; min-width:0; }
.ws-name{ font-size:14px; font-weight:700; color:#27272A; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ws-oneliner{ font-size:12px; color:#A1A1AA; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.badge{ font-size:11px; font-weight:700; padding:3px 10px; border-radius:100px; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; }
.badge-on-track{ background:#ECFDF5; color:#059669; }
.badge-at-risk{ background:#FFFBEB; color:#D97706; }
.badge-blocked{ background:#FEF2F2; color:#DC2626; }
.chev{ width:18px; height:18px; color:#D4D4D8; transition:transform .2s,color .2s; flex-shrink:0; }
.ws.open .chev{ transform:rotate(180deg); color:#A1A1AA; }

/* Expand panel */
.ws-expand{ max-height:0; overflow:hidden; transition:max-height .35s ease; }
.ws.open .ws-expand{ max-height:8000px; }
.ws-expand-inner{ padding:0 20px 24px; border-top:1px solid #ECECEE; }
.ws-summary{ font-size:14px; color:#6A6A73; line-height:1.6; padding:18px 0 16px; max-width:700px; }
.prog{ display:flex; align-items:center; gap:10px; margin-bottom:18px; }
.prog-track{ flex:1; height:5px; background:#F3F4F6; border-radius:3px; overflow:hidden; }
.prog-fill{ height:100%; border-radius:3px; transition:width .4s; }
.prog-label{ font-size:11px; font-weight:700; color:#A1A1AA; white-space:nowrap; }
.ms-row{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px; }
.ms{ font-size:11px; font-weight:700; padding:3px 10px; border-radius:5px; white-space:nowrap; }
.ms-done{ background:#ECFDF5; color:#059669; }
.ms-soon{ background:#FEF3C7; color:#92400E; }
.ms-future{ background:#F3F4F6; color:#6A6A73; }
.ms-cancel{ background:#F3F4F6; color:#A1A1AA; text-decoration:line-through; }
.detail-two-col{ display:grid; grid-template-columns:1fr 1fr; gap:28px; }
.col-title{ font-size:11px; font-weight:700; color:#A1A1AA; text-transform:uppercase; letter-spacing:.06em; padding-bottom:8px; border-bottom:1px solid #F4F4F5; margin-bottom:10px; }
.grp{ font-size:12px; font-weight:700; color:#27272A; margin-top:10px; margin-bottom:4px; }
.grp:first-of-type{ margin-top:0; }
.dl{ list-style:none; padding:0; }
.dl li{ font-size:12px; color:#6A6A73; padding:2px 0 2px 14px; position:relative; line-height:1.45; }
.dl li::before{ content:""; position:absolute; left:0; top:8px; width:4px; height:4px; border-radius:50%; background:#D4D4D8; }
.dl li.ck::before{ background:#059669; }
.dl li.up::before{ background:#D97706; }
.dl li.rm{ text-decoration:line-through; color:#C4C4C8; }
.dl li.rm::before{ background:#E4E4E7; }
.dl li.cancel{ text-decoration:line-through; color:#A1A1AA; }
.dl li.cancel::before{ background:#E4E4E7; }
.tl{ position:relative; padding-left:18px; margin-top:4px; }
.tl::before{ content:""; position:absolute; left:3px; top:6px; bottom:6px; width:1.5px; background:#ECECEE; }
.tl-item{ position:relative; padding:3px 0 8px; font-size:12px; color:#6A6A73; line-height:1.45; }
.tl-item::before{ content:""; position:absolute; left:-18px; top:8px; width:7px; height:7px; background:#FFF; border:2px solid #D97706; border-radius:50%; z-index:1; }
.tl-item .td{ font-weight:700; color:#27272A; }
.deliverables-panel{ background:#FAFAFA; border:1px solid #ECECEE; border-radius:8px; padding:18px 20px; margin-top:20px; }
.del-header{ font-size:13px; font-weight:700; color:#27272A; margin-bottom:14px; }
.del-two-col{ display:grid; grid-template-columns:1fr 1fr; gap:24px; }
.del-badge{ display:inline-block; font-size:10px; font-weight:700; padding:3px 10px; border-radius:100px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:10px; }
.del-badge.completed{ background:#ECFDF5; color:#059669; }
.del-badge.upcoming{ background:#F3F4F6; color:#6A6A73; }
.del-badge.removed{ background:#FEF2F2; color:#DC2626; }
.completed-section{ border-top:1px solid #F4F4F5; margin-top:20px; padding-top:16px; }
.completed-toggle{ display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none; font-size:11px; font-weight:700; color:#A1A1AA; text-transform:uppercase; letter-spacing:.06em; }
.completed-toggle svg{ width:14px; height:14px; color:#D4D4D8; transition:transform .2s; }
.completed-toggle.open svg{ transform:rotate(180deg); }
.completed-body{ max-height:0; overflow:hidden; transition:max-height .3s ease; }
.completed-body.open{ max-height:4000px; padding-top:10px; }
.no-data{ text-align:center; padding:80px 24px; color:#A1A1AA; font-size:14px; }
.foot{ text-align:center; color:#D4D4D8; font-size:11px; padding:20px; letter-spacing:.02em; }
</style>
</head>

<script>
function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function bc(s){ return {"on-track":"badge-on-track","at-risk":"badge-at-risk","blocked":"badge-blocked"}[s]||""; }
function bl(s){ return {"on-track":"On track","at-risk":"At risk","blocked":"Blocked"}[s]||s; }

const WS_COLORS={
  ops:{ fill:"var(--ws-ops)", tag:"#065F46", tagBg:"#D1FAE5" },
  app:{ fill:"var(--ws-app)", tag:"#1D4ED8", tagBg:"#DBEAFE" },
  products:{ fill:"var(--ws-products)", tag:"#6D28D9", tagBg:"#EDE9FE" },
  experiences:{ fill:"var(--ws-experiences)", tag:"#B45309", tagBg:"#FEF3C7" }
};

function grouped(obj,cls){
  if(!obj) return "";
  let h="";
  for(const[g,items]of Object.entries(obj)){
    h+='<div class="grp">'+esc(g)+'</div><ul class="dl">';
    for(const i of items){
      const c=i.toLowerCase().includes("canceled")||i.toLowerCase().includes("removed")?
        "cancel":(cls||"");
      h+='<li class="'+c+'">'+esc(i)+'</li>';
    }
    h+='</ul>';
  }
  return h;
}

function renderGantt(g){
  if(!g) return "";
  let h='<div class="gantt-section">';
  h+='<div class="gantt-title">'+esc(g.title)+'</div>';
  h+='<div class="gantt-subtitle">Timeline view \u2013 milestones and key dates across all workstreams</div>';
  h+='<div class="gantt-wrapper"><div class="gantt">';

  h+='<div class="gantt-months">';
  for(const m of g.months) h+='<div class="gantt-month">'+m+'</div>';
  h+='</div>';

  h+='<div class="gantt-body">';
  h+='<div class="gantt-today" style="left:'+g.todayPosition+'%"><span class="gantt-today-label">Today</span></div>';
  if(g.launchPosition) {
    h+='<div class="gantt-launch" style="left:'+g.launchPosition+'%"><span class="gantt-launch-label">'+esc(g.launchLabel||"")+'</span></div>';
  }

  for(const lane of g.lanes) {
    const statusColor = lane.status === "on-track" ? "#059669" : lane.status === "at-risk" ? "#D97706" : "#DC2626";
    h+='<div class="gantt-lane">';
    h+='<div class="gantt-lane-label"><span class="gantt-status-dot" style="background:'+statusColor+'"></span>'+esc(lane.label)+'</div>';
    h+='<div class="gantt-bar-track">';
    h+='<div class="gantt-bar" style="left:'+lane.barStart+'%;right:'+(100-lane.barEnd)+'%;background:'+lane.color+'"></div>';
    h+='<div class="gantt-bar-active" style="left:'+lane.activeStart+'%;right:'+(100-lane.activeEnd)+'%;background:'+lane.color+'"></div>';
    if(lane.milestones) {
      for(const ms of lane.milestones) {
        h+='<div class="gantt-milestone" style="left:'+ms.pos+'%"></div>';
        if(ms.label) {
          const lbl = ms.label.replace(/\\n/g,"<br>");
          h+='<div class="gantt-ms-label" style="left:'+ms.pos+'%">'+lbl+'</div>';
        }
      }
    }
    h+='</div>';
    h+='</div>';
  }

  h+='</div>';
  h+='</div></div>';
  h+='</div>';
  return h;
}

function render(wk){
  const d=WEEKS[wk], main=document.getElementById("main"), hero=document.getElementById("hero");

  if(!d||!d.workstreams||!d.workstreams.length){
    hero.innerHTML='<div class="hero-pill" style="background:#F3F4F6;color:#A1A1AA">No data for this week</div>';
    main.innerHTML='<div class="no-data">Add workstream data to the JSON block to populate this week.</div>';
    return;
  }

  const ws=d.workstreams;
  const blk=ws.filter(w=>w.status==="blocked").length;
  const atR=ws.filter(w=>w.status==="at-risk").length;

  let hc,ht;
  if(blk>0){ hc="has-block"; ht=blk+" workstream"+(blk>1?"s":"")+" blocked"; }
  else if(atR>0){ hc="has-risk"; ht=atR+" workstream"+(atR>1?"s":"")+" at risk"; }
  else{ hc="all-clear"; ht="All "+ws.length+" workstreams on track"; }
  let heroHtml='<div class="hero-pill '+hc+'"><span class="hero-dot"></span>'+ht+'</div>';
  heroHtml+='<div class="hero-sub">'+ws.length+' active workstreams this period</div>';
  if(d.gantt && d.gantt.launchLabel) {
    heroHtml+='<div class="hero-launch">'+esc(d.gantt.launchLabel)+'</div>';
  }
  hero.innerHTML=heroHtml;

  let html="";

  if(d.urgentItems && d.urgentItems.length){
    html+='<div class="urgent"><div class="urgent-header"><span class="urgent-dot"></span>Urgent</div><ul class="urgent-list">';
    for(const a of d.urgentItems) html+='<li>'+esc(a)+'</li>';
    html+='</ul></div>';
  }

  if(d.attentionItems && d.attentionItems.length){
    html+='<div class="attention"><div class="attention-header"><span class="attention-dot"></span>Needs attention</div><ul class="attention-list">';
    for(const a of d.attentionItems) html+='<li>'+esc(a)+'</li>';
    html+='</ul></div>';
  }

  html += renderGantt(d.gantt);

  let allUp=[];
  for(const w of ws){
    if(!w.upcoming) continue;
    const c=WS_COLORS[w.color]||WS_COLORS.app;
    const shortName=w.name.split(":")[0].split(",")[0].trim();
    for(const u of w.upcoming){
      allUp.push({date:u.date,text:u.text,ws:shortName,tagColor:c.tag,tagBg:c.tagBg});
    }
  }
  if(allUp.length){
    html+='<div class="next-up"><div class="sec-label">What\'s coming up</div><div class="next-list">';
    for(const u of allUp){
      html+='<div class="next-item"><span class="next-date">'+esc(u.date)+'</span><span class="next-text">'+esc(u.text)+'</span><span class="next-tag" style="color:'+u.tagColor+';background:'+u.tagBg+'">'+esc(u.ws)+'</span></div>';
    }
    html+='</div></div>';
  }

  html+='<div class="ws-section"><div class="sec-label">Workstream detail</div>';
  let wsIdx=0;
  for(const w of ws){
    const c=WS_COLORS[w.color]||WS_COLORS.app;
    const uid="ws"+wsIdx; wsIdx++;

    html+='<div class="ws" id="'+uid+'">';
    html+='<div class="ws-color-bar" style="background:'+c.fill+'"></div>';
    html+='<div class="ws-bar" onclick="document.getElementById(\''+uid+'\').classList.toggle(\'open\')">';
    html+='<div class="ws-bar-left"><div class="ws-name">'+esc(w.name)+'</div><div class="ws-oneliner">'+esc(w.oneliner||"")+'</div></div>';
    html+='<span class="badge '+bc(w.status)+'">'+bl(w.status)+'</span>';
    html+='<svg class="chev" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 7.5L10 12.5L15 7.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    html+='</div>';

    html+='<div class="ws-expand"><div class="ws-expand-inner">';
    html+='<div class="ws-summary">'+esc(w.summary||"")+'</div>';

    html+='<div class="detail-two-col">';
    html+='<div><div class="col-title">Activities in progress</div>';
    html+=grouped(w.inProgress,"");
    html+='</div>';
    html+='<div>';
    if(w.upcoming&&w.upcoming.length){
      html+='<div class="col-title">Upcoming activities</div><div class="tl">';
      for(const u of w.upcoming) html+='<div class="tl-item"><span class="td">'+esc(u.date)+':</span> '+esc(u.text)+'</div>';
      html+='</div>';
    }
    html+='</div></div>';

    if(w.deliverables){
      html+='<div class="deliverables-panel"><div class="del-header">Deliverables</div><div class="del-two-col">';
      html+='<div>';
      if(w.deliverables.completed){
        html+='<span class="del-badge completed">Completed</span>';
        html+=grouped(w.deliverables.completed,"ck");
      }
      if(w.deliverables.removed){
        html+='<div style="margin-top:14px"><span class="del-badge removed">Removed from scope</span></div>';
        html+=grouped(w.deliverables.removed,"cancel");
      }
      html+='</div><div>';
      if(w.deliverables.upcoming){
        html+='<span class="del-badge upcoming">Upcoming</span>';
        html+=grouped(w.deliverables.upcoming,"up");
      }
      html+='</div></div></div>';
    }

    if(w.completed){
      const cid="comp"+uid;
      html+='<div class="completed-section">';
      html+='<div class="completed-toggle" id="ct'+cid+'" onclick="document.getElementById(\'ct'+cid+'\').classList.toggle(\'open\');document.getElementById(\'cb'+cid+'\').classList.toggle(\'open\')">';
      html+='<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 7.5L10 12.5L15 7.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      html+='Completed activities to date</div>';
      html+='<div class="completed-body" id="cb'+cid+'">';
      html+=grouped(w.completed,"ck");
      html+='</div></div>';
    }

    html+='</div></div></div>';
  }
  html+='</div>';

  main.innerHTML=html;
}

document.addEventListener("DOMContentLoaded",function(){
  var s=document.getElementById("wk");
  var keys=Object.keys(WEEKS);
  keys.forEach(function(k){var o=document.createElement("option");o.value=k;o.textContent=k;s.appendChild(o);});
  s.value=keys[keys.length-1];
  s.addEventListener("change",function(){render(s.value);});
  render(s.value);
});
</script>
